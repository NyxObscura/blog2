<nav class="site-nav" role="navigation" aria-label="Main navigation">
  <div class="nav-inner">
    <a href="{{ "/" | relURL }}" class="nav-logo" aria-label="{{ .Site.Title }} home">
      
      <img src="{{ "/favicon-32x32.png" | relURL }}" alt="Obscuraworks Logo" width="28" height="28" style="border-radius: 6px; object-fit: contain;">
      
      <span>
        <span class="nav-logo-text">Obscuraworks</span>
        <span class="nav-logo-sub"> / engineering</span>
      </span>
    </a>

    <ul class="nav-links" id="nav-links" role="list">
      {{- range .Site.Menus.main -}}
        {{- $isExternal := .Params.external -}}
        {{- $isCTA := .Params.cta -}}
        <li{{ if $isCTA }} class="nav-cta"{{ end }}>
          <a href="{{ .URL }}"
             {{ if $isExternal }}target="_blank" rel="noopener noreferrer"{{ end }}
             {{ if $isCTA }}aria-label="{{ .Name }} — opens Obscuraworks platform"{{ end }}>
            {{- .Name -}}
          </a>
        </li>
      {{- end }}
    </ul>

    <div class="nav-actions">
      <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme" title="Toggle dark/light mode">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
        </svg>
      </button>

      <button id="nav-hamburger" class="nav-hamburger" aria-label="Toggle menu" aria-expanded="false" aria-controls="nav-links">
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
      </button>
    </div>
  </div>
</nav>

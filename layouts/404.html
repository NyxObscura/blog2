{{ define "main" }}
<div style="min-height:60vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:3rem 1.5rem;">
  <div>
    <p style="font-family:var(--font-mono);font-size:5rem;font-weight:700;color:var(--border-light);line-height:1;margin-bottom:1rem;">404</p>
    <h1 style="font-size:1.5rem;margin-bottom:0.75rem;">Page Not Found</h1>
    <p style="color:var(--text-secondary);max-width:360px;margin:0 auto 2rem;">
      The page you're looking for doesn't exist or has been moved.
    </p>
    <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;">
      <a href="{{ "/" | relURL }}" class="btn btn-primary">← Home</a>
      <a href="{{ "/blog/" | relURL }}" class="btn btn-secondary">Browse Blog</a>
    </div>
  </div>
</div>
{{ end }}
